<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meta - Módulos</title>
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Pular para o conteúdo</a>
    <header class="topbar">
      <div class="container topbar__content">
        <div class="brand">
          <div class="brand__title">Meta</div>
          <div class="brand__subtitle">Aulas e Materiais</div>
        </div>
        <nav class="breadcrumbs" aria-label="Navegação">
          <a class="breadcrumbs__link" href="#/">Início</a>
          <span class="breadcrumbs__sep" aria-hidden="true">/</span>
          <span class="breadcrumbs__current" data-breadcrumbs-current>—</span>
        </nav>
      </div>
    </header>

    <main class="container" id="main">
      <section class="page-header">
        <h1 class="page-header__title" data-page-title>Módulos</h1>
        <p class="page-header__subtitle" data-page-subtitle>
          Selecione um módulo para ver as disciplinas.
        </p>
        <div class="search" data-search>
          <label class="search__label" for="search-input">Buscar</label>
          <div class="search__row">
            <input
              class="search__input"
              id="search-input"
              type="search"
              placeholder="Buscar itens..."
              autocomplete="off"
              inputmode="search"
              data-search-input
            />
            <button class="btn btn--sm" type="button" data-search-clear>Limpar</button>
          </div>
          <div class="search__hint" data-search-hint>Atalho: / para buscar</div>
        </div>
      </section>

      <section class="grid" aria-label="Itens" data-grid></section>
    </main>

    <template id="card-template">
      <a class="card" href="#">
        <div class="card__icon" aria-hidden="true"></div>
        <div class="card__body">
          <div class="card__title"></div>
          <div class="card__meta"></div>
        </div>
      </a>
    </template>
  </body>

    <dialog
      class="modal"
      data-topics-modal
      aria-labelledby="topics-modal-title"
    >
      <div class="modal__header">
        <div class="modal__title" id="topics-modal-title" data-topics-modal-title>
          —
        </div>
        <button class="modal__close" type="button" data-topics-modal-close>
          Fechar
        </button>
      </div>
      <div class="modal__content">
        <ul class="modal__list" data-topics-modal-list></ul>
      </div>
    </dialog>
</html>
