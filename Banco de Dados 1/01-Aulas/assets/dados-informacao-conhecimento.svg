<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Comparação entre Dados, Informação e Conhecimento">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#cffafe"/>
    </linearGradient>
    <style>
      .t { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #0f172a; }
      .h { font-weight: 800; font-size: 44px; letter-spacing: 0.2px; }
      .p { font-size: 24px; opacity: 0.92; }
      .s { font-size: 22px; opacity: 0.82; }
    </style>
  </defs>

  <rect x="40" y="40" width="1120" height="600" rx="28" fill="rgba(2,6,23,0.04)" stroke="rgba(2,6,23,0.10)" stroke-width="2"/>
  <text class="t h" x="600" y="110" text-anchor="middle">Dados → Informação → Conhecimento</text>
  <text class="t p" x="600" y="150" text-anchor="middle">O mesmo conteúdo ganha valor conforme recebe contexto e interpretação</text>

  <g>
    <path d="M260 520 L940 520 L870 610 L330 610 Z" fill="url(#g1)" stroke="#2563eb" stroke-width="4" />
    <text class="t h" x="600" y="565" text-anchor="middle">Dados</text>
    <text class="t s" x="600" y="598" text-anchor="middle">fatos brutos • valores soltos • sem contexto</text>
  </g>

  <g>
    <path d="M350 360 L850 360 L800 450 L400 450 Z" fill="url(#g2)" stroke="#0ea5e9" stroke-width="4" />
    <text class="t h" x="600" y="405" text-anchor="middle">Informação</text>
    <text class="t s" x="600" y="438" text-anchor="middle">dados organizados • contexto • significado</text>
  </g>

  <g>
    <path d="M460 220 L740 220 L700 300 L500 300 Z" fill="url(#g3)" stroke="#14b8a6" stroke-width="4" />
    <text class="t h" x="600" y="265" text-anchor="middle">Conhecimento</text>
    <text class="t s" x="600" y="298" text-anchor="middle">padrões • interpretação • decisão</text>
  </g>

  <g fill="none" stroke="#0f172a" stroke-width="3" opacity="0.5">
    <path d="M600 310 L600 345" />
    <path d="M600 460 L600 505" />
  </g>
  <g fill="#0f172a" opacity="0.5">
    <path d="M600 345 L590 330 L610 330 Z" />
    <path d="M600 505 L590 490 L610 490 Z" />
  </g>

  <g>
    <text class="t p" x="140" y="230">Exemplo rápido</text>
    <text class="t s" x="140" y="265">Dados: “Maria”, “25”, “Belo Horizonte”</text>
    <text class="t s" x="140" y="295">Informação: “Maria tem 25 anos e mora em BH.”</text>
    <text class="t s" x="140" y="325">Conhecimento: “Perfil X prefere Y → melhor ação Z.”</text>
  </g>
</svg>

